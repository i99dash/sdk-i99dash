<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cluster Hello World — IVI side</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0b0f17;
        color: #e6e9ef;
        padding: 24px;
        font-size: 16px;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 16px;
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      h1 .version {
        font-size: 12px;
        font-weight: 500;
        color: #6c7a93;
        background: #1a2233;
        padding: 2px 8px;
        border-radius: 10px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .pill {
        padding: 4px 10px;
        border-radius: 12px;
        background: #1a2233;
        font-size: 13px;
      }
      .pill.ok {
        background: #134e2a;
        color: #b9f0c5;
      }
      .pill.err {
        background: #4e1313;
        color: #f0b9b9;
      }
      .pill.info {
        background: #1a3550;
        color: #b9d8f0;
      }
      pre {
        background: #0f141d;
        border-radius: 6px;
        padding: 12px;
        overflow: auto;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #95a3b9;
        max-height: 320px;
      }
      button {
        background: #2a3a55;
        color: #e6e9ef;
        border: 0;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .display-card {
        background: #11192a;
        border: 1px solid #1f2b44;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 6px;
      }
      .display-meta {
        font-size: 12px;
        color: #95a3b9;
        margin-top: 4px;
      }
      .display-meta strong {
        color: #c8d3e6;
      }
      .display-card button {
        margin-top: 6px;
        margin-right: 6px;
      }
      .hint {
        font-size: 12px;
        color: #95a3b9;
        margin: 8px 0 4px;
      }
    </style>
  </head>
  <body>
    <h1>Cluster Hello World <span class="version">v0.1.3</span></h1>
    <div class="row">
      <span class="pill" id="bridge-pill">bridge: …</span>
      <span class="pill" id="display-pill">displays: …</span>
      <span class="pill" id="surface-pill">surface: idle</span>
    </div>
    <p class="hint">
      Tap "Open" on each display to find the one wired to the physical cluster. The host's
      <code>isCluster</code> flag is a hint, not ground truth on every head unit (XDJA fission
      virtualizes some IDs as background slots).
    </p>
    <div id="display-list"></div>
    <div class="row">
      <button id="close" disabled>Close active surface</button>
    </div>
    <pre id="log"></pre>
    <script>
      // Smallest possible host-bridge usage: raw `callHandler` calls
      // through the host-injected `flutter_inappwebview` global. The
      // SDK package wraps the same calls with typed helpers; this
      // example skips the package so the bundle is a single static
      // HTML file with no build step.
      //
      // Production mini-apps SHOULD use the `i99dash` SDK package
      // instead of raw bridge calls. This is for hardware
      // verification only.
      (function () {
        var pill = function (id, text, kind) {
          var el = document.getElementById(id);
          el.textContent = text;
          el.className = 'pill ' + (kind || '');
        };
        var log = function (msg) {
          var el = document.getElementById('log');
          el.textContent += msg + '\n';
          el.scrollTop = el.scrollHeight;
        };
        var bridge = window.flutter_inappwebview;
        if (!bridge) {
          pill('bridge-pill', 'bridge: missing', 'err');
          log('No host bridge — running outside i99dash host?');
          return;
        }
        pill('bridge-pill', 'bridge: ok', 'ok');

        var sfcId = null;
        var sfcDisplayId = null;

        async function call(name, args) {
          var raw = await bridge.callHandler(name, {
            params: args || {},
            idempotencyKey: 'k' + Math.random().toString(16).slice(2),
          });
          if (raw && raw.success === false) {
            throw new Error(raw.error.code + ': ' + raw.error.message);
          }
          return (raw && raw.data) || raw;
        }

        function renderDisplays(displays) {
          var host = document.getElementById('display-list');
          host.innerHTML = '';
          displays.forEach(function (d) {
            var card = document.createElement('div');
            card.className = 'display-card';
            var title = document.createElement('div');
            title.innerHTML = '<strong>id=' + d.id + '</strong> · ' + (d.name || '?');
            card.appendChild(title);
            var meta = document.createElement('div');
            meta.className = 'display-meta';
            meta.innerHTML =
              '<strong>' +
              d.width +
              '×' +
              d.height +
              '@' +
              d.densityDpi +
              'dpi</strong> · ' +
              'default=' +
              !!d.isDefault +
              ' · presentation=' +
              !!d.isPresentation +
              ' · cluster=' +
              !!d.isCluster;
            card.appendChild(meta);
            var btn = document.createElement('button');
            btn.textContent = 'Open here';
            btn.addEventListener('click', function () {
              openOn(d.id);
            });
            card.appendChild(btn);
            host.appendChild(card);
          });
        }

        async function start() {
          try {
            var r = await call('display.list');
            log('display.list → ' + JSON.stringify(r));
            var displays = (r && r.displays) || [];
            if (displays.length === 0) {
              pill('display-pill', 'displays: empty', 'err');
              return;
            }
            pill('display-pill', 'displays: ' + displays.length, 'ok');
            renderDisplays(displays);
          } catch (e) {
            pill('display-pill', 'displays: error', 'err');
            log('display.list failed: ' + (e && e.message));
          }
        }

        async function openOn(displayId) {
          // Close any active surface first so we don't leak a
          // Presentation across taps.
          if (sfcId) {
            try {
              await call('surface.destroy', { surfaceId: sfcId });
              log('surface.destroy (auto) ok');
            } catch (e) {
              log('surface.destroy (auto) failed: ' + (e && e.message));
            }
            sfcId = null;
          }
          try {
            var r = await call('surface.create', {
              displayId: displayId,
              route: '/cluster.html',
            });
            sfcId = r.surfaceId;
            sfcDisplayId = displayId;
            pill('surface-pill', 'surface: ' + r.path + ' on id=' + displayId, 'ok');
            log('surface.create(displayId=' + displayId + ') → ' + JSON.stringify(r));
            document.getElementById('close').disabled = false;
          } catch (e) {
            pill('surface-pill', 'surface: error', 'err');
            log('surface.create(displayId=' + displayId + ') failed: ' + (e && e.message));
          }
        }

        document.getElementById('close').addEventListener('click', async function () {
          if (!sfcId) return;
          try {
            await call('surface.destroy', { surfaceId: sfcId });
            log('surface.destroy(id=' + sfcDisplayId + ') ok');
            sfcId = null;
            sfcDisplayId = null;
            pill('surface-pill', 'surface: idle', 'info');
            document.getElementById('close').disabled = true;
          } catch (e) {
            log('surface.destroy failed: ' + (e && e.message));
          }
        });

        start();
      })();
    </script>
  </body>
</html>
