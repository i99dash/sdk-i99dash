<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dash Wallpaper</title>
    <!--
      Sentry browser SDK — sync-loaded so it captures errors that
      fire before any in-page script runs (module-load syntax errors
      on older WebViews, unhandled rejections from the bridge dance).
      Per-trim filtering uses the tags set after `display.list()`
      resolves below.
    -->
    <script
      src="https://browser.sentry-cdn.com/8.40.0/bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      if (typeof Sentry !== 'undefined') {
        Sentry.init({
          dsn: 'https://576526869e4b743b9f8a6e687d2d45fe@o4505563001520128.ingest.us.sentry.io/4511281579819008',
          release: 'dash-wallpaper@0.4.0',
          environment: 'production',
          // BrowserTracing + Replay add no value inside a sandboxed
          // mini-app WebView and would burn quota on noise.
          integrations: function (defaults) {
            return defaults.filter(function (i) {
              return i.name !== 'BrowserTracing' && i.name !== 'Replay';
            });
          },
          sendDefaultPii: false,
        });
        Sentry.getCurrentScope().setTags({
          'app.id': 'dash-wallpaper',
          'app.version': '0.4.0',
        });
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #050810;
        --bg-1: #0a0e16;
        --bg-2: #11192a;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --text-0: #e6e9ef;
        --text-1: #95a3b9;
        --text-2: #6c7a93;
        --accent: #58c7ff;
        --accent-2: #c8a8ff;
        --good: #b9f0c5;
        --warn: #f4a261;
        --err: #f0b9b9;
        --r-sm: 8px;
        --r-md: 12px;
        --r-lg: 16px;
      }

      * {
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
      }
      input,
      textarea {
        -webkit-user-select: auto;
        user-select: auto;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(at 20% 20%, rgba(88, 199, 255, 0.05), transparent 50%),
          radial-gradient(at 80% 80%, rgba(200, 168, 255, 0.05), transparent 50%), var(--bg-0);
        color: var(--text-0);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 15px;
        overflow: hidden;
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        gap: 0;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .header {
        padding: 14px 20px 10px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .pill {
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        background: var(--bg-2);
        color: var(--text-1);
      }
      .pill.version {
        background: rgba(88, 199, 255, 0.1);
        color: var(--accent);
      }
      .header .spacer {
        flex: 1;
      }
      .status {
        font-size: 12px;
        color: var(--text-1);
      }
      .status .count {
        color: var(--accent);
        font-weight: 600;
      }

      /* ── Display picker ─────────────────────────────────────── */
      .targets {
        padding: 0 20px 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .chip {
        position: relative;
        padding: 10px 14px;
        border-radius: var(--r-md);
        background: var(--bg-2);
        border: 1px solid var(--border);
        cursor: pointer;
        transition:
          background 0.15s ease,
          border 0.15s ease,
          transform 0.15s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .chip:hover {
        border-color: var(--border-strong);
      }
      .chip.on {
        background: rgba(88, 199, 255, 0.12);
        border-color: var(--accent);
        color: var(--text-0);
      }
      .chip.disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .chip .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-2);
        transition: background 0.15s ease;
      }
      .chip.on .dot {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }
      .chip .name {
        font-size: 13px;
        font-weight: 500;
      }
      .chip .meta {
        font-size: 10px;
        color: var(--text-2);
        margin-left: 4px;
      }

      /* ── Tabs ───────────────────────────────────────────────── */
      .tabs {
        padding: 0 20px;
        display: flex;
        gap: 4px;
        border-bottom: 1px solid var(--border);
      }
      .tab {
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-1);
        cursor: pointer;
        background: none;
        border: 0;
        border-bottom: 2px solid transparent;
        transition: color 0.15s ease;
      }
      .tab:hover {
        color: var(--text-0);
      }
      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* ── Body ────────────────────────────────────────────────── */
      .body {
        overflow-y: auto;
        padding: 18px 20px 14px;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }

      /* Gallery ------------------------------------------------- */
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }
      .preset {
        position: relative;
        aspect-ratio: 16 / 9;
        border-radius: var(--r-md);
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border 0.15s ease;
      }
      .preset.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(88, 199, 255, 0.18);
      }
      .preset .thumb {
        position: absolute;
        inset: 0;
      }
      .preset .label {
        position: absolute;
        left: 8px;
        bottom: 8px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 500;
      }

      /* Upload -------------------------------------------------- */
      .drop {
        border: 2px dashed var(--border-strong);
        border-radius: var(--r-md);
        padding: 36px 20px;
        text-align: center;
        cursor: pointer;
        transition:
          border 0.15s ease,
          background 0.15s ease;
      }
      .drop:hover,
      .drop.dragover {
        border-color: var(--accent);
        background: rgba(88, 199, 255, 0.04);
      }
      .drop .ic {
        font-size: 32px;
        color: var(--accent);
        margin-bottom: 8px;
      }
      .drop .hd {
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .drop .sub {
        font-size: 12px;
        color: var(--text-1);
      }
      .drop input[type='file'] {
        display: none;
      }
      .uploaded-preview {
        margin-top: 16px;
        border-radius: var(--r-md);
        overflow: hidden;
        aspect-ratio: 16 / 9;
        background: var(--bg-2);
        position: relative;
      }
      .uploaded-preview .thumb {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .uploaded-preview img,
      .uploaded-preview video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Gradient ------------------------------------------------ */
      .gradient-preview {
        height: 140px;
        border-radius: var(--r-md);
        margin-bottom: 14px;
        border: 1px solid var(--border);
      }
      .swatch-row {
        margin-bottom: 14px;
      }
      .swatch-label {
        font-size: 12px;
        color: var(--text-1);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .swatch-hex {
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 11px;
        color: var(--text-2);
      }
      .swatches {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 6px;
      }
      .swatch {
        aspect-ratio: 1 / 1;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.12s ease,
          border 0.12s ease;
      }
      .swatch:active {
        transform: scale(0.92);
      }
      .swatch.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(88, 199, 255, 0.18);
      }
      .gradient-controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .gradient-btn {
        padding: 6px 10px;
        font-size: 12px;
        background: var(--bg-2);
        color: var(--text-1);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        cursor: pointer;
      }
      .gradient-btn.on {
        background: rgba(88, 199, 255, 0.12);
        color: var(--accent);
        border-color: var(--accent);
      }

      /* ── Footer (apply bar) ──────────────────────────────────── */
      .footer {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        background: rgba(10, 14, 22, 0.6);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .footer .selection {
        flex: 1;
        font-size: 12px;
        color: var(--text-1);
      }
      .footer .selection .ok {
        color: var(--good);
      }
      .footer button {
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        border: 0;
        border-radius: var(--r-md);
        cursor: pointer;
      }
      .footer .clear {
        background: var(--bg-2);
        color: var(--text-1);
      }
      .footer .clear:hover {
        background: rgba(240, 185, 185, 0.1);
        color: var(--err);
      }
      .footer .apply {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: var(--bg-0);
      }
      .footer .apply:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-2);
        border: 1px solid var(--border-strong);
        padding: 10px 18px;
        border-radius: var(--r-md);
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
        max-width: 80%;
        text-align: center;
      }
      .toast.show {
        opacity: 1;
      }
      .toast.err {
        border-color: var(--err);
        color: var(--err);
      }

      /* Built-in gradient presets */
      .preset[data-preset='nebula'] .thumb {
        background: linear-gradient(135deg, #0f1c33, #1a0a3a, #4a0e6f);
      }
      .preset[data-preset='aurora'] .thumb {
        background: linear-gradient(135deg, #001f1a, #024d4d, #00bfa5, #c8a8ff);
      }
      .preset[data-preset='sunset'] .thumb {
        background: linear-gradient(135deg, #1a0838, #c52a4d, #ff8e3c, #ffd166);
      }
      .preset[data-preset='neon-grid'] .thumb {
        background:
          linear-gradient(rgba(88, 199, 255, 0.15) 1px, transparent 1px) 0 0 / 24px 24px,
          linear-gradient(90deg, rgba(88, 199, 255, 0.15) 1px, transparent 1px) 0 0 / 24px 24px,
          linear-gradient(135deg, #0a0e16, #1a2848);
      }
      .preset[data-preset='monochrome'] .thumb {
        background: linear-gradient(135deg, #000, #1a1a1a, #404040);
      }
      .preset[data-preset='circuit'] .thumb {
        background:
          radial-gradient(at 20% 20%, rgba(88, 199, 255, 0.4), transparent 30%),
          radial-gradient(at 80% 80%, rgba(200, 168, 255, 0.3), transparent 30%), #0a0e16;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- ── Header ────────────────────────────────────────── -->
      <header class="header">
        <h1>Dash Wallpaper</h1>
        <span class="pill version">v0.1.4</span>
        <!-- Trim chip — populated from `display.list`'s `vehicle`
             field (host 1.6+). Hidden when the host doesn't supply
             one (older builds, dev runner). Helps users (and triagers)
             see which trim profile is active without opening
             developer tools. -->
        <span class="pill" id="trimPill" hidden></span>
        <span class="spacer"></span>
        <span class="status"><span class="count" id="targetCount">0</span> screens selected</span>
      </header>

      <!-- ── Display picker ────────────────────────────────── -->
      <div class="targets" id="targets">
        <!-- chips injected by JS once display.list resolves -->
      </div>

      <!-- ── Tabs ──────────────────────────────────────────── -->
      <div class="tabs">
        <button class="tab active" data-tab="gallery">Gallery</button>
        <button class="tab" data-tab="upload">Upload</button>
        <button class="tab" data-tab="gradient">Gradient</button>
      </div>

      <!-- ── Body ──────────────────────────────────────────── -->
      <div class="body">
        <!-- Gallery -->
        <div class="panel active" data-panel="gallery">
          <div class="gallery">
            <div class="preset" data-preset="nebula">
              <div class="thumb"></div>
              <span class="label">Nebula</span>
            </div>
            <div class="preset" data-preset="aurora">
              <div class="thumb"></div>
              <span class="label">Aurora</span>
            </div>
            <div class="preset" data-preset="sunset">
              <div class="thumb"></div>
              <span class="label">Sunset</span>
            </div>
            <div class="preset" data-preset="neon-grid">
              <div class="thumb"></div>
              <span class="label">Neon Grid</span>
            </div>
            <div class="preset" data-preset="monochrome">
              <div class="thumb"></div>
              <span class="label">Monochrome</span>
            </div>
            <div class="preset" data-preset="circuit">
              <div class="thumb"></div>
              <span class="label">Circuit</span>
            </div>
          </div>
        </div>

        <!-- Upload -->
        <div class="panel" data-panel="upload">
          <label class="drop" id="drop">
            <div class="ic">⬆</div>
            <div class="hd">Drag image or video — or tap to browse</div>
            <div class="sub">PNG / JPG / WebP / MP4 — up to 8&nbsp;MB</div>
            <input type="file" id="fileInput" accept="image/*,video/*" />
          </label>
          <div class="uploaded-preview" id="uploadedPreview" style="display: none">
            <div class="thumb" id="uploadedThumb"></div>
          </div>
        </div>

        <!-- Gradient — tap-driven swatches (native <input type=color>
             doesn't open a picker in the IVI WebView). -->
        <div class="panel" data-panel="gradient">
          <div class="gradient-preview" id="gradPreview"></div>

          <div class="swatch-row">
            <div class="swatch-label">
              Start <span class="swatch-hex" id="gradC1Hex">#0f1c33</span>
            </div>
            <div class="swatches" id="gradC1Swatches"></div>
          </div>

          <div class="swatch-row">
            <div class="swatch-label">
              End <span class="swatch-hex" id="gradC2Hex">#c8a8ff</span>
            </div>
            <div class="swatches" id="gradC2Swatches"></div>
          </div>

          <div class="gradient-controls">
            <button class="gradient-btn on" data-angle="135">Diagonal</button>
            <button class="gradient-btn" data-angle="0">Top → Bottom</button>
            <button class="gradient-btn" data-angle="90">Left → Right</button>
            <button class="gradient-btn" data-angle="radial">Radial</button>
          </div>
        </div>
      </div>

      <!-- ── Footer ────────────────────────────────────────── -->
      <footer class="footer">
        <span class="selection" id="selection">Pick a wallpaper above</span>
        <button class="clear" id="clear">Clear</button>
        <button class="apply" id="apply" disabled>Apply</button>
      </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      (function () {
        // Raw bridge — host injects flutter_inappwebview.callHandler. The
        // typed `i99dash` package wraps the same calls; this example uses
        // raw to keep the bundle a single static file with no build step.
        var bridge = window.flutter_inappwebview;
        if (!bridge) {
          alert('No host bridge — run inside i99dash.');
          return;
        }

        async function call(name, args) {
          var raw = await bridge.callHandler(name, {
            params: args || {},
            idempotencyKey: 'k' + Math.random().toString(16).slice(2),
          });
          if (raw && raw.success === false) {
            throw new Error(raw.error.code + ': ' + raw.error.message);
          }
          return (raw && raw.data) || raw;
        }

        // ── State ────────────────────────────────────────────
        var state = {
          targets: new Set(), // displayId set
          activeSurfaces: new Map(), // displayId → surfaceId
          mode: null, // 'preset' | 'upload' | 'gradient'
          preset: null,
          upload: null, // { dataUrl, kind: 'image'|'video' }
          gradient: { c1: '#0f1c33', c2: '#c8a8ff', angle: 135 },
        };

        // ── DOM helpers ─────────────────────────────────────
        function $(sel) {
          return document.querySelector(sel);
        }
        function $$(sel) {
          return Array.from(document.querySelectorAll(sel));
        }

        function toast(msg, kind) {
          var el = $('#toast');
          el.textContent = msg;
          el.classList.toggle('err', kind === 'err');
          el.classList.add('show');
          clearTimeout(el._t);
          el._t = setTimeout(function () {
            el.classList.remove('show');
          }, 2400);
        }

        // ── Display picker ──────────────────────────────────
        function displayLabel(d) {
          // Prefer the host-supplied overrideLabel ("Driver" on L8 /
          // L5L per VehicleProfile) so the chip matches what the
          // rest of i99dash calls this display.
          if (d.overrideLabel) return { name: d.overrideLabel, meta: d.width + '×' + d.height };
          if (d.isDefault) return { name: 'Head Unit', meta: d.width + '×' + d.height };
          if (d.name && d.name.toLowerCase() === 'fse')
            return { name: 'Passenger', meta: d.width + '×' + d.height };
          if (d.isCluster) {
            // Per BYD's secondary-overlay pattern (`..._1` is the
            // friendly slot — see SDK multi-display guide).
            var secondary = /XDJAScreenProjection_1$/i.test(d.name);
            return {
              name: 'Cluster',
              meta: secondary ? 'overlay' : d.width + '×' + d.height,
            };
          }
          return { name: d.name || 'Display ' + d.id, meta: d.width + '×' + d.height };
        }

        function renderTrimPill(vehicle) {
          var pill = $('#trimPill');
          if (!pill) return;
          var label =
            vehicle && (vehicle.friendlyName || vehicle.variantId || vehicle.dilinkFamily);
          if (!label) {
            pill.hidden = true;
            return;
          }
          var detail =
            vehicle.variantId && vehicle.friendlyName !== vehicle.variantId
              ? ' (' + vehicle.variantId + ')'
              : '';
          pill.textContent = label + detail;
          pill.hidden = false;
        }

        async function loadDisplays() {
          var r = await call('display.list');
          var all = (r && r.displays) || [];
          // host 1.6+ ships {variantId, friendlyName, dilinkFamily}
          // alongside the displays. Older hosts return undefined —
          // we hide the trim pill in that case.
          var vehicle = (r && r.vehicle) || null;
          // Tag every captured Sentry event from this point on with
          // the active trim's identity. Lets us slice errors by
          // car.variant in Sentry — identical pattern to pkg-launcher.
          if (typeof Sentry !== 'undefined' && vehicle) {
            Sentry.getCurrentScope().setTags({
              'car.variant': vehicle.variantId || 'unknown',
              'car.subTrim': vehicle.subTrim || '',
              'car.dilinkFamily': vehicle.dilinkFamily || 'unknown',
              'car.friendlyName': vehicle.friendlyName || '',
              'car.isFallback': String(vehicle.isFallback === true),
            });
          }
          renderTrimPill(vehicle);
          // Filter out shadow / duplicate displays the active
          // VehicleProfile flags (e.g. display 3 on L8 mirrors 5).
          // Older hosts (no `hidden` field) leave every entry through.
          var visible = all.filter(function (d) {
            return !d.hidden;
          });
          // Whether the cluster is physically reachable on this trim.
          // False on Leopard 5 / 5 Ultra / 7 / HAN L. We still render
          // the cluster chip but disable it + tooltip "why" so users
          // don't tap into a guaranteed-fail surface.create call.
          var clusterOk = visible.some(function (d) {
            return d.isCluster && d.clusterAvailable !== false;
          });
          var trimName = r && r.vehicle && (r.vehicle.friendlyName || r.vehicle.variantId);
          // Order: IVI, passenger, friendly cluster slot, then any others.
          var ordered = visible.slice().sort(function (a, b) {
            var rank = function (d) {
              if (d.isDefault) return 0;
              if (d.name && d.name.toLowerCase() === 'fse') return 1;
              if (/XDJAScreenProjection_1$/i.test(d.name)) return 2;
              if (d.isCluster) return 3;
              return 4;
            };
            return rank(a) - rank(b);
          });

          var host = $('#targets');
          host.innerHTML = '';
          ordered.forEach(function (d) {
            var lbl = displayLabel(d);
            var clusterUnavailable = d.isCluster && d.clusterAvailable === false && !clusterOk;
            var disabled = d.isDefault || clusterUnavailable;
            var chip = document.createElement('div');
            chip.className = 'chip' + (disabled ? ' disabled' : '');
            chip.dataset.displayId = d.id;
            if (clusterUnavailable) {
              chip.title =
                'Cluster not supported on this trim' + (trimName ? ' (' + trimName + ')' : '');
            }
            chip.innerHTML =
              '<span class="dot"></span>' +
              '<span class="name">' +
              lbl.name +
              '</span>' +
              '<span class="meta">' +
              lbl.meta +
              '</span>';
            if (!disabled) {
              chip.addEventListener('click', function () {
                if (state.targets.has(d.id)) state.targets.delete(d.id);
                else state.targets.add(d.id);
                chip.classList.toggle('on');
                updateUI();
              });
            }
            host.appendChild(chip);
          });
          updateUI();
        }

        // ── Tabs ────────────────────────────────────────────
        $$('.tab').forEach(function (tab) {
          tab.addEventListener('click', function () {
            $$('.tab').forEach(function (t) {
              t.classList.remove('active');
            });
            tab.classList.add('active');
            $$('.panel').forEach(function (p) {
              p.classList.remove('active');
            });
            $('[data-panel="' + tab.dataset.tab + '"]').classList.add('active');
          });
        });

        // ── Gallery ─────────────────────────────────────────
        $$('.preset').forEach(function (el) {
          el.addEventListener('click', function () {
            $$('.preset').forEach(function (p) {
              p.classList.remove('selected');
            });
            el.classList.add('selected');
            state.mode = 'preset';
            state.preset = el.dataset.preset;
            updateUI();
          });
        });

        // ── Upload ──────────────────────────────────────────
        var drop = $('#drop');
        var fi = $('#fileInput');

        drop.addEventListener('dragover', function (e) {
          e.preventDefault();
          drop.classList.add('dragover');
        });
        drop.addEventListener('dragleave', function () {
          drop.classList.remove('dragover');
        });
        drop.addEventListener('drop', function (e) {
          e.preventDefault();
          drop.classList.remove('dragover');
          var f = e.dataTransfer.files[0];
          if (f) handleFile(f);
        });
        fi.addEventListener('change', function (e) {
          var f = e.target.files[0];
          if (f) handleFile(f);
        });

        function handleFile(f) {
          var MAX = 8 * 1024 * 1024;
          if (f.size > MAX) {
            toast('File too large — 8 MB max', 'err');
            return;
          }
          var kind = f.type.startsWith('video/') ? 'video' : 'image';
          var reader = new FileReader();
          reader.onload = function () {
            state.upload = { dataUrl: reader.result, kind: kind };
            state.mode = 'upload';
            // Preview
            var prev = $('#uploadedPreview');
            var thumb = $('#uploadedThumb');
            prev.style.display = 'block';
            thumb.innerHTML = '';
            if (kind === 'image') {
              var img = document.createElement('img');
              img.src = reader.result;
              thumb.appendChild(img);
            } else {
              var vid = document.createElement('video');
              vid.src = reader.result;
              vid.muted = true;
              vid.loop = true;
              vid.autoplay = true;
              vid.playsInline = true;
              thumb.appendChild(vid);
            }
            updateUI();
          };
          reader.readAsDataURL(f);
        }

        // ── Gradient ────────────────────────────────────────
        // 20-color curated palette — covers the obvious wallpaper
        // moods (deep blues / purples, warm sunsets, neons,
        // monochromes). The native `<input type=color>` doesn't open
        // a picker on the IVI WebView; tap-friendly swatches are
        // both more reliable and more car-ergonomic anyway.
        var SWATCHES = [
          '#0f1c33',
          '#1a0a3a',
          '#4a0e6f',
          '#001f1a',
          '#024d4d',
          '#00bfa5',
          '#c8a8ff',
          '#1a0838',
          '#c52a4d',
          '#ff8e3c',
          '#ffd166',
          '#000000',
          '#1a1a1a',
          '#404040',
          '#ffffff',
          '#0a0e16',
          '#58c7ff',
          '#b9f0c5',
          '#f0b9b9',
          '#1a2848',
        ];
        var gPrev = $('#gradPreview');
        var gC1Hex = $('#gradC1Hex'),
          gC2Hex = $('#gradC2Hex');

        function gradientCss(g) {
          if (g.angle === 'radial') {
            return 'radial-gradient(circle at 30% 30%, ' + g.c1 + ', ' + g.c2 + ')';
          }
          return 'linear-gradient(' + g.angle + 'deg, ' + g.c1 + ', ' + g.c2 + ')';
        }

        function renderSwatches(hostId, slot) {
          var host = $('#' + hostId);
          host.innerHTML = '';
          SWATCHES.forEach(function (hex) {
            var sw = document.createElement('div');
            sw.className = 'swatch';
            if (hex === state.gradient[slot]) sw.classList.add('selected');
            sw.style.background = hex;
            sw.dataset.hex = hex;
            sw.addEventListener('click', function () {
              state.gradient[slot] = hex;
              renderSwatches(hostId, slot); // refresh selected ring
              refreshGradient();
            });
            host.appendChild(sw);
          });
        }

        function refreshGradient() {
          gPrev.style.background = gradientCss(state.gradient);
          gC1Hex.textContent = state.gradient.c1;
          gC2Hex.textContent = state.gradient.c2;
          state.mode = 'gradient';
          updateUI();
        }

        $$('.gradient-btn').forEach(function (b) {
          b.addEventListener('click', function () {
            $$('.gradient-btn').forEach(function (x) {
              x.classList.remove('on');
            });
            b.classList.add('on');
            var raw = b.dataset.angle;
            state.gradient.angle = raw === 'radial' ? 'radial' : parseInt(raw, 10);
            refreshGradient();
          });
        });

        // initial paint
        renderSwatches('gradC1Swatches', 'c1');
        renderSwatches('gradC2Swatches', 'c2');
        refreshGradient();

        // ── Apply / Clear ──────────────────────────────────
        function selectionLabel() {
          if (!state.mode) return 'Pick a wallpaper above';
          if (state.mode === 'preset') return 'Selected: ' + state.preset;
          if (state.mode === 'upload')
            return 'Uploaded ' + (state.upload.kind === 'video' ? 'video' : 'image');
          if (state.mode === 'gradient') return 'Custom gradient';
          return '';
        }

        function updateUI() {
          $('#targetCount').textContent = state.targets.size;
          $('#selection').innerHTML =
            (state.mode ? '<span class="ok">✓</span> ' : '') + selectionLabel();
          $('#apply').disabled = state.targets.size === 0 || !state.mode;
        }

        // route(?src=…&kind=…&grad=…) — wallpaper.html parses
        function buildRoute() {
          var p = new URLSearchParams();
          if (state.mode === 'preset') {
            p.set('preset', state.preset);
          } else if (state.mode === 'upload') {
            p.set('src', state.upload.dataUrl);
            p.set('kind', state.upload.kind);
          } else if (state.mode === 'gradient') {
            p.set('grad', gradientCss(state.gradient));
          }
          return '/wallpaper.html?' + p.toString();
        }

        async function clearAll() {
          var ids = Array.from(state.activeSurfaces.values());
          state.activeSurfaces.clear();
          for (var i = 0; i < ids.length; i++) {
            try {
              await call('surface.destroy', { surfaceId: ids[i] });
            } catch (e) {
              // surface might already be gone — swallow
            }
          }
          toast('Cleared');
        }

        $('#clear').addEventListener('click', clearAll);

        $('#apply').addEventListener('click', async function () {
          var route = buildRoute();
          var ok = 0,
            fail = 0;
          for (var displayId of state.targets) {
            // Replace existing surface on this display, if any.
            var existing = state.activeSurfaces.get(displayId);
            if (existing) {
              try {
                await call('surface.destroy', { surfaceId: existing });
              } catch (e) {}
              state.activeSurfaces.delete(displayId);
            }
            try {
              var r = await call('surface.create', { displayId: displayId, route: route });
              state.activeSurfaces.set(displayId, r.surfaceId);
              ok++;
            } catch (e) {
              fail++;
              console.error('apply on ' + displayId + ':', e);
            }
          }
          if (fail === 0) toast('Applied to ' + ok + ' screen(s)');
          else if (ok === 0) toast(fail + ' failed', 'err');
          else toast(ok + ' applied · ' + fail + ' failed');
        });

        // ── Boot ─────────────────────────────────────────────
        loadDisplays().catch(function (e) {
          toast('display.list failed: ' + (e && e.message), 'err');
        });
      })();
    </script>
  </body>
</html>
