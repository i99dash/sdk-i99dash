<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2848"/>
      <stop offset="1" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58c7ff"/>
      <stop offset="1" stop-color="#c8a8ff"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Three-screen rocket — packages launching across displays. -->
  <g fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="2">
    <rect x="40" y="60" width="60" height="44" rx="6"/>
    <rect x="108" y="60" width="60" height="44" rx="6"/>
    <rect x="176" y="60" width="40" height="44" rx="6"/>
  </g>

  <!-- App grid (3 cols x 3 rows) -->
  <g fill="url(#glow)">
    <rect x="68" y="124" width="22" height="22" rx="5" opacity="0.85"/>
    <rect x="98" y="124" width="22" height="22" rx="5" opacity="0.6"/>
    <rect x="128" y="124" width="22" height="22" rx="5" opacity="0.4"/>
    <rect x="158" y="124" width="22" height="22" rx="5" opacity="0.6"/>
    <rect x="188" y="124" width="22" height="22" rx="5" opacity="0.85"/>

    <rect x="68" y="154" width="22" height="22" rx="5" opacity="0.6"/>
    <rect x="98" y="154" width="22" height="22" rx="5" opacity="0.85"/>
    <rect x="128" y="154" width="22" height="22" rx="5" opacity="1"/>
    <rect x="158" y="154" width="22" height="22" rx="5" opacity="0.85"/>
    <rect x="188" y="154" width="22" height="22" rx="5" opacity="0.6"/>

    <rect x="68" y="184" width="22" height="22" rx="5" opacity="0.4"/>
    <rect x="98" y="184" width="22" height="22" rx="5" opacity="0.6"/>
    <rect x="128" y="184" width="22" height="22" rx="5" opacity="0.85"/>
    <rect x="158" y="184" width="22" height="22" rx="5" opacity="0.6"/>
    <rect x="188" y="184" width="22" height="22" rx="5" opacity="0.4"/>
  </g>

  <!-- Up-arrow launching from the grid into the screen row -->
  <path
    d="M 128 134 L 128 100 M 116 112 L 128 100 L 140 112"
    fill="none"
    stroke="#58c7ff"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
