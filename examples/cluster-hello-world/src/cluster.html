<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cluster Hello World — cluster side</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #0f1c33 0%, #050810 100%);
        color: #e6e9ef;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .panel {
        text-align: center;
      }
      .title {
        font-size: 64px;
        font-weight: 700;
        letter-spacing: 0.02em;
        background: linear-gradient(120deg, #58c7ff, #c8a8ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .sub {
        font-size: 22px;
        color: #95a3b9;
        margin-top: 12px;
      }
      .clock {
        margin-top: 28px;
        font-size: 48px;
        font-variant-numeric: tabular-nums;
        font-feature-settings: 'tnum';
        color: #b9d8f0;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="title">Hello from the cluster</div>
      <div class="sub">i99dash native-capability surface · v0.1.3</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
    <script>
      // Static cluster page — no host bridge in this slice (secondary
      // surfaces ship without `__i99dashHost`). Pure self-contained
      // rendering proves the WebView mount works end-to-end. Phase B+
      // adds the secondary bridge so this page can read live state.
      (function () {
        function tick() {
          var now = new Date();
          var pad = function (n) {
            return n < 10 ? '0' + n : '' + n;
          };
          document.getElementById('clock').textContent =
            pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
        }
        tick();
        setInterval(tick, 1000);
      })();
    </script>
  </body>
</html>
