name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Publish even if release-please reports no qualifying commits (manual recovery path).'
        type: boolean
        default: false

# Two release-please runs racing on the same branch can fight over the
# release PR. One at a time.
concurrency:
  group: release-please
  cancel-in-progress: false

# Defaults are minimal; each job widens what it needs. release-please
# needs PR + contents write to open + merge the release PR; the
# publish job needs id-token for npm provenance.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          # release-please reads release-please-config.json + the
          # manifest at the repo root by default; explicit paths kept
          # for readability.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    # Run when release-please cut a release on main, OR when a manual
    # workflow_dispatch passed force_publish=true (recovery path used
    # when release-please skipped because there were no qualifying
    # conventional commits).
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true' || github.event.inputs.force_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # sigstore provenance via OIDC
    # Same env-lift trick as ci.yml — `secrets.*` is blocked in
    # step-level `if`, env vars work.
    env:
      BACKEND_REPO_PAT: ${{ secrets.BACKEND_REPO_PAT }}
      CAR_REPO_PAT: ${{ secrets.CAR_REPO_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: i99dash-sdk

      # Backend repo is private; without a PAT the drift step is
      # skipped. Backend-side CI gates the same JSON, so missing it
      # here is a guardrail loss, not a correctness loss.
      - id: backend-checkout
        if: env.BACKEND_REPO_PAT != ''
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: i99dev/backend-i99dash
          token: ${{ secrets.BACKEND_REPO_PAT }}
          path: backend-i99dash
          fetch-depth: 1

      # Same shape — host repo for the driver-label contract drift
      # check. Skipped without the PAT; host-side CI mirrors the
      # invariant.
      - id: car-checkout
        if: env.CAR_REPO_PAT != ''
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: i99dev/i99dash
          token: ${{ secrets.CAR_REPO_PAT }}
          path: car-i99dash
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: i99dash-sdk/pnpm-lock.yaml
          # The publish step uses npm CLI directly (not pnpm) — pnpm
          # publish doesn't speak the provenance flag yet. registry-url
          # has to be set so npm picks up NODE_AUTH_TOKEN.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: i99dash-sdk
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: i99dash-sdk
        run: pnpm typecheck

      - name: Lint
        working-directory: i99dash-sdk
        run: pnpm lint

      - name: Test
        working-directory: i99dash-sdk
        run: pnpm test

      - name: Build
        working-directory: i99dash-sdk
        run: pnpm build

      - name: Category-slugs drift check
        if: steps.backend-checkout.outcome == 'success'
        working-directory: i99dash-sdk
        env:
          BACKEND_REPO_PATH: ${{ github.workspace }}/backend-i99dash
        run: pnpm check:category-drift

      - name: Drift check skipped (no backend access)
        if: steps.backend-checkout.outcome != 'success' || env.BACKEND_REPO_PAT == ''
        run: |
          echo "::warning::category-slugs drift check skipped — set BACKEND_REPO_PAT in repo secrets to gate publishes on it."

      - name: Driver-label contract drift check
        if: steps.car-checkout.outcome == 'success'
        working-directory: i99dash-sdk
        env:
          CAR_REPO_PATH: ${{ github.workspace }}/car-i99dash
        run: pnpm check:driver-label-contract

      - name: Driver-label contract check skipped (no host access)
        if: steps.car-checkout.outcome != 'success' || env.CAR_REPO_PAT == ''
        run: |
          echo "::warning::driver-label contract check skipped — set CAR_REPO_PAT in repo secrets to gate publishes on it."

      - name: Verify CLI binary builds cleanly
        working-directory: i99dash-sdk
        run: |
          test -x dist/cli.js
          head -1 dist/cli.js | grep -q '^#!/usr/bin/env node'
          node dist/cli.js --help | grep -q '^Usage: i99dash'

      - name: Publish to npm
        working-directory: i99dash-sdk
        env:
          # Granular access token issued for the `i99dash` package
          # only. Stored as NPM_TOKEN in repo secrets.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: npm publish --access public

      # ── Standalone CLI binaries + download manifest ──────────────────
      # The importable SDK ships on npm (above); the `i99dash` CLI ALSO
      # ships as download-and-run per-OS binaries (like i99op) so users
      # without Node can install it and `i99dash upgrade` in place. We
      # compile the CJS bundle with @yao-pkg/pkg (keytar is a dynamic
      # optional import — absent in the binary, the keychain falls back to
      # its encrypted file). All gated on PORTAL_ENABLED so releases stay
      # green until the secrets are provisioned.
      - name: Compile standalone CLI binaries
        if: ${{ vars.PORTAL_ENABLED == 'true' }}
        working-directory: i99dash-sdk
        run: |
          mkdir -p build-bin
          for spec in \
            "node20-linux-x64 i99dash-linux-x64" \
            "node20-macos-arm64 i99dash-macos-arm64" \
            "node20-macos-x64 i99dash-macos-x64" \
            "node20-win-x64 i99dash-windows-x64.exe"; do
            set -- $spec
            echo "pkg → $2 ($1)"
            npx -y @yao-pkg/pkg dist/cli.cjs --targets "$1" --output "build-bin/$2"
          done
          ls -la build-bin

      - name: Mirror binaries to Spaces CDN + register downloads
        if: ${{ vars.PORTAL_ENABLED == 'true' }}
        working-directory: i99dash-sdk
        env:
          SPACES_KEY: ${{ secrets.RELEASES_SPACES_KEY }}
          SPACES_SECRET: ${{ secrets.RELEASES_SPACES_SECRET }}
          PORTAL_URL: ${{ vars.PORTAL_URL }}
          PORTAL_TOKEN: ${{ secrets.PORTAL_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          sudo apt-get install -y -qq s3cmd jq
          VERSION="${TAG#v}"
          CDN="https://i99dash-miniapps.fra1.cdn.digitaloceanspaces.com"
          S3_ARGS=(
            --access_key="$SPACES_KEY"
            --secret_key="$SPACES_SECRET"
            --host=fra1.digitaloceanspaces.com
            --host-bucket='%(bucket)s.fra1.digitaloceanspaces.com'
            --acl-public
          )
          assets='[]'
          for f in build-bin/*; do
            base=$(basename "$f")
            case "$base" in
              *windows-x64.exe) plat=windows-x64 ;;
              *linux-x64)       plat=linux-x64 ;;
              *macos-arm64)     plat=macos-arm64 ;;
              *macos-x64)       plat=macos-x64 ;;
              *) echo "skip $base"; continue ;;
            esac
            s3cmd "${S3_ARGS[@]}" put "$f" "s3://i99dash-miniapps/cli-releases/$VERSION/$base"
            sha=$(sha256sum "$f" | awk '{print $1}')
            size=$(stat -c%s "$f")
            assets=$(echo "$assets" | jq \
              --arg p "$plat" --arg u "$CDN/cli-releases/$VERSION/$base" \
              --arg s "$sha" --argjson z "$size" --arg fn "$base" \
              '. + [{platform:$p,url:$u,sha256:$s,sizeBytes:$z,filename:$fn}]')
          done

          post() { curl -fSL -X POST "$PORTAL_URL/api/v1/admin/downloads" \
              -H "Authorization: Bearer $PORTAL_TOKEN" -H "Content-Type: application/json" \
              --retry 5 --retry-all-errors --retry-delay 10 -d @-; }

          # CLI binaries
          jq -n --arg version "$VERSION" --arg notes "i99dash CLI $VERSION" --argjson assets "$assets" \
            '{kind:"cli_i99dash", version:$version, notes:$notes, assets:$assets}' | post
          # SDK (npm) — no binary; the install command IS the artifact
          jq -n --arg version "$VERSION" \
            '{kind:"sdk", version:$version, notes:("i99dash SDK "+$version+" — npm package"),
              installCommand:"npm install i99dash",
              homepageUrl:"https://www.npmjs.com/package/i99dash", assets:[]}' | post
