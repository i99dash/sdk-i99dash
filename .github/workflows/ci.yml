name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same PR when a new push lands —
# avoids burning runners on stale commits during fast-fix cycles.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    # Lift the secret into an env var so step-level `if` conditions
    # can read it. GitHub deliberately blocks `secrets.*` in if
    # expressions; env vars work.
    env:
      BACKEND_REPO_PAT: ${{ secrets.BACKEND_REPO_PAT }}
      CAR_REPO_PAT: ${{ secrets.CAR_REPO_PAT }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Need sibling checkouts for cross-repo drift checks. The
          # SDK is co-versioned with both the backend (capability /
          # category taxonomies) and the host (driver-label
          # contract); this checks them out alongside the SDK under
          # test so the scripts can compare directly.
          path: i99dash-sdk

      # Cross-repo checkout needs a PAT with read access to the
      # private backend-i99dash. Without it, the drift step is
      # skipped — backend-side CI gates the same JSON, so missing it
      # here is a guardrail loss, not a correctness loss.
      - id: backend-checkout
        if: env.BACKEND_REPO_PAT != ''
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          repository: i99dev/backend-i99dash
          token: ${{ secrets.BACKEND_REPO_PAT }}
          path: backend-i99dash
          fetch-depth: 1

      # Same shape as backend-checkout — host repo is private; PAT
      # gates the driver-label-contract drift check. When the PAT
      # is missing the check skips with a warning; host-side CI
      # owns the same invariant from the other direction.
      - id: car-checkout
        if: env.CAR_REPO_PAT != ''
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          repository: i99dev/i99dash
          token: ${{ secrets.CAR_REPO_PAT }}
          path: car-i99dash
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: i99dash-sdk/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: i99dash-sdk
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: i99dash-sdk
        run: pnpm typecheck

      - name: Lint
        working-directory: i99dash-sdk
        run: pnpm lint

      - name: Format check
        working-directory: i99dash-sdk
        run: pnpm format:check

      - name: Build
        working-directory: i99dash-sdk
        run: pnpm build

      - name: Test
        working-directory: i99dash-sdk
        run: pnpm test

      - name: Category-slugs drift check
        # Only run when the backend checkout above actually succeeded.
        # The drift check is a cross-repo guardrail; if we can't reach
        # the backend (no PAT, or repo moved), we skip rather than
        # fail the whole CI run on something the SDK alone can't fix.
        if: steps.backend-checkout.outcome == 'success'
        working-directory: i99dash-sdk
        env:
          BACKEND_REPO_PATH: ${{ github.workspace }}/backend-i99dash
        run: pnpm check:category-drift

      - name: Drift check skipped (no backend access)
        if: steps.backend-checkout.outcome != 'success' || env.BACKEND_REPO_PAT == ''
        run: |
          echo "::warning::category-slugs drift check skipped — set BACKEND_REPO_PAT in repo secrets (PAT with read:contents on i99dev/backend-i99dash) to enable."

      - name: Driver-label contract drift check
        # Verifies every overrideLabel value the host's
        # VehicleProfile.kt emits is in the SDK's
        # RESERVED_OVERRIDE_LABELS enum. Skip if no host checkout —
        # host-side CI owns the same invariant from the reverse
        # direction.
        if: steps.car-checkout.outcome == 'success'
        working-directory: i99dash-sdk
        env:
          CAR_REPO_PATH: ${{ github.workspace }}/car-i99dash
        run: pnpm check:driver-label-contract

      - name: Driver-label contract check skipped (no host access)
        if: steps.car-checkout.outcome != 'success' || env.CAR_REPO_PAT == ''
        run: |
          echo "::warning::driver-label contract check skipped — set CAR_REPO_PAT in repo secrets (PAT with read:contents on i99dev/i99dash) to enable."

      - name: Verify CLI binary builds cleanly
        working-directory: i99dash-sdk
        # Smoke-test the published shape: the bin file must have a
        # shebang and be executable. catches a regression in the
        # tsup post-build hook before it ships.
        run: |
          test -x dist/cli.js
          head -1 dist/cli.js | grep -q '^#!/usr/bin/env node'
          # Help banner says `i99dash`, not `sdk-i99dash`.
          node dist/cli.js --help | grep -q '^Usage: i99dash'
